name: Setup
description: Checkout, pnpm, Node 20, install deps
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: 9.12.0
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash
